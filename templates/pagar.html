<!DOCTYPE html>
<html>

<head>

    <title>Pagamento</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #4facfe;
            background: linear-gradient(120deg, #4facfe, #00f2fe);
        }

        .container {
            width: 100%;
            padding: 20px;
        }

        .box {
            background: white;
            max-width: 420px;
            margin: 40px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        p {
            color: #555;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .pagar {
            background: #007bff;
            color: white;
        }

        .pagar:hover {
            background: #0056b3;
        }

        .gerar {
            background: #28a745;
            color: white;
        }

        .gerar:hover {
            background: #1e7e34;
        }

        @media (max-width: 600px) {

            .box {
                margin: 10px;
                padding: 20px;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <div class="box">

        <h2>Pagamento</h2>

        <p>Para gerar o QR Code, faça o pagamento</p>

        <a class="btn pagar" href="{{ init_point }}">
            💳 Pagar agora
        </a>

        <a class="btn gerar" href="/gerar?link={{ link }}">
            ✅ Já paguei, gerar QR Code
        </a>

    </div>

</div>

</body>

</html>
