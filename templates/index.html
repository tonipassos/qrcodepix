<!DOCTYPE html>
<html>
<head>
    <title>Gerador de QR Code</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-dark text-white">

<div class="container mt-5">

    <h1 class="text-center">Gerador de QR Code</h1>

    <form action="/pagar" method="post" class="mt-4">

        <label>Tipo</label>
        <select name="tipo" class="form-control">

            <option value="site">QR de Site</option>
            <option value="pix">QR PIX</option>

        </select>

        <br>

        <input name="link" class="form-control" placeholder="Link do site">

        <br>

        <input name="chave" class="form-control" placeholder="Chave PIX">

        <br>

        <input name="nome" class="form-control" placeholder="Nome">

        <br>

        <input name="cidade" class="form-control" placeholder="Cidade">

        <br>

        <input name="valor" class="form-control" placeholder="Valor">

        <br>

        <button class="btn btn-success w-100">
            Gerar QR (R$5)
        </button>

    </form>

</div>

</body>
</html>
