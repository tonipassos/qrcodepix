<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<h2>Gerador QR Code</h2>

{% if msg %}
<div class="alert alert-danger">
{{ msg }}
</div>
{% endif %}


<form action="/pagar" method="post">


<select name="tipo" class="form-control">

<option value="">Escolha</option>

<option value="site"
{% if tipo=="site" %}selected{% endif %}
>
QR Site
</option>

<option value="pix"
{% if tipo=="pix" %}selected{% endif %}
>
QR Pix
</option>

</select>


<br>


<input
name="link"
class="form-control"
placeholder="Link"
value="{{ link }}"
>


<br>


<input
name="chave"
class="form-control"
placeholder="Chave pix"
value="{{ chave }}"
>


<br>


<input
name="nome"
class="form-control"
placeholder="Nome"
value="{{ nome }}"
>


<br>


<button class="btn btn-success">

Gerar QR (R$5)

</button>


</form>

</div>

</body>
</html>
